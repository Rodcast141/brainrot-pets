<!DOCTYPE html>
<html>
<head>
  <title>Brainrot Pets</title>

  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>

<body>

<a-scene>

  <!-- ASSETS -->
  <a-assets>
    <a-asset-item id="normalDog" src="normalDog.glb"></a-asset-item>
    <a-asset-item id="proDog" src="dog.glb"></a-asset-item>
    <a-asset-item id="adminPet" src="adminPet.glb"></a-asset-item>
  </a-assets>

  <!-- CAMERA -->
  <a-entity id="camera" camera look-controls position="0 1.6 0"></a-entity>

  <!-- 🌍 WORLD 1 -->
  <a-entity id="world1">

    <a-plane rotation="-90 0 0" width="30" height="30" color="green"></a-plane>

    <!-- WALLS -->
    <a-box position="0 2 -15" width="30" height="4" depth="1" color="#444"></a-box>
    <a-box position="0 2 15" width="30" height="4" depth="1" color="#444"></a-box>
    <a-box position="-15 2 0" width="1" height="4" depth="30" color="#444"></a-box>
    <a-box position="15 2 0" width="1" height="4" depth="30" color="#444"></a-box>

    <!-- CRYSTALS -->
    <a-cone class="crystal" position="2 1 -5" color="#00ffff"></a-cone>
    <a-cone class="crystal" position="-3 1 -6" color="#00ffff"></a-cone>
    <a-cone class="crystal" position="4 1 -7" color="#00ffff"></a-cone>

    <!-- TUNNEL -->
    <a-ring id="tunnelDoor" position="0 2 -10" radius-inner="1.5" radius-outer="2.5"
            color="#888"></a-ring>

  </a-entity>

  <!-- 🌱 PLANT WORLD -->
  <a-entity id="plantWorld" visible="false">
    <a-plane rotation="-90 0 0" width="30" height="30" color="#2ecc71"></a-plane>

    <a-sphere class="egg" position="0 1 -4" radius="0.5" color="white"></a-sphere>
    <a-sphere class="egg" position="2 1 -6" radius="0.5" color="white"></a-sphere>
  </a-entity>

  <!-- UI -->
  <a-text id="coinsText" value="Coins: 0" position="0 3 -3"></a-text>

  <!-- 📊 LEADERBOARD -->
  <a-text id="rebirthBoard" position="-4 4 -3"></a-text>

  <a-box id="rebirthButton" position="-4 2 -3" color="purple"></a-box>
  <a-text value="REBIRTH" position="-4 2 -2.7"></a-text>

  <!-- 📖 TUTORIAL -->
  <a-text id="tutorialText" position="0 5 -3" color="yellow"></a-text>

</a-scene>

</body>
</html>
