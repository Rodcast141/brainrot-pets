<!DOCTYPE html>
<html>
<head>
  <title>Brainrot VR Game</title>

  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<a-scene>

  <!-- ASSETS -->
  <a-assets>
    <a-asset-item id="specialModel" src="model-1774245879012.glb"></a-asset-item>
    <a-asset-item id="dogModel" src="https://cdn.aframe.io/test-models/models/glTF/Duck/glTF/Duck.gltf"></a-asset-item>
  </a-assets>

  <!-- PLAYER CAMERA -->
  <a-entity id="camera" camera look-controls position="0 1.6 0"></a-entity>

  <!-- WORLDS -->
  <a-entity id="world1">
    <a-plane rotation="-90 0 0" width="30" height="30" color="green"></a-plane>
  </a-entity>

  <a-entity id="world2" visible="false">
    <a-plane rotation="-90 0 0" width="30" height="30" color="red"></a-plane>
  </a-entity>

  <!-- TELEPORT -->
  <a-box id="toWorld2" position="3 1 -3" color="blue"></a-box>
  <a-box id="toWorld1" position="0 1 -3" color="yellow"></a-box>

  <!-- UI -->
  <a-text id="coinsText" value="Coins: 0" position="0 3 -3" color="white"></a-text>

  <!-- EGG -->
  <a-box id="eggT1" position="-2 1 -3" color="white"></a-box>

</a-scene>

<script src="script.js"></script>

</body>
</html>
